<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #212121;
      color: #f9fafb;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: rgba(107, 164, 231, 0.1);
      border: 1px solid rgba(107, 164, 231, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 16px;
      height: 16px;
      fill: #6BA4E7;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f9fafb;
      letter-spacing: -0.01em;
    }

    /* ── Status pill ── */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status.disconnected {
      background: rgba(239, 68, 68, 0.06);
      border-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }
    .status.disconnected .status-dot {
      background: #EF4444;
    }

    .status.connected {
      background: rgba(34, 197, 94, 0.06);
      border-color: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }
    .status.connected .status-dot {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .status.loading {
      background: rgba(107, 164, 231, 0.06);
      border-color: rgba(107, 164, 231, 0.15);
      color: #89B8ED;
    }
    .status.loading .status-dot {
      background: #6BA4E7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Inputs ── */
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(44, 45, 62, 0.6);
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      background: rgba(24, 24, 24, 0.6);
      color: #f9fafb;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: rgba(178, 178, 178, 0.5);
    }

    input:focus {
      outline: none;
      border-color: rgba(107, 164, 231, 0.4);
      box-shadow: 0 0 0 3px rgba(107, 164, 231, 0.1);
    }

    /* ── Buttons ── */
    button {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: #6BA4E7;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(107, 164, 231, 0.25);
    }
    .btn-primary:hover {
      background: #5494E0;
      box-shadow: 0 0 30px rgba(107, 164, 231, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(24, 24, 24, 0.5);
      color: #e0e0e0;
      border: 1px solid rgba(44, 45, 62, 0.4);
    }
    .btn-secondary:hover {
      background: rgba(44, 45, 62, 0.4);
      border-color: rgba(44, 45, 62, 0.6);
      color: #f9fafb;
    }

    .btn-success {
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .btn-success:hover {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.3);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.08);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.15);
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.25);
    }

    /* ── User info card ── */
    .user-info {
      padding: 14px;
      background: rgba(24, 24, 24, 0.5);
      border: 1px solid rgba(44, 45, 62, 0.3);
      border-radius: 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(107, 164, 231, 0.1);
      border: 1px solid rgba(107, 164, 231, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .user-avatar svg {
      width: 18px;
      height: 18px;
      stroke: #6BA4E7;
      fill: none;
      stroke-width: 2;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-info p {
      margin: 0;
      font-size: 12px;
      color: #b2b2b2;
      line-height: 1.4;
    }

    .user-info strong {
      color: #f9fafb;
      font-size: 13px;
      font-weight: 600;
    }

    /* ── Misc ── */
    .hidden { display: none; }

    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 4px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.12);
      border-radius: 10px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(44, 45, 62, 0.3);
      margin: 14px 0;
    }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #b2b2b2;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z" />
      </svg>
    </div>
    <h1>Canvas Connect</h1>
  </div>

  <div id="status" class="status disconnected">
    <span class="status-dot"></span>
    <span id="status-text">Not connected</span>
  </div>

  <div id="setup-section">
    <label class="input-label" for="domain">Canvas Domain</label>
    <input type="text" id="domain" placeholder="your-school.instructure.com" value="iu.instructure.com">
    <label class="input-label" for="server">Server URL</label>
    <input type="text" id="server" placeholder="Server URL" value="http://localhost:3002">
    <button class="btn-primary" id="connect-btn">Connect Canvas</button>
    <p class="error hidden" id="error"></p>
  </div>

  <div id="connected-section" class="hidden">
    <div class="user-info">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <div class="user-details">
        <p><strong id="user-name"></strong></p>
        <p id="user-email"></p>
      </div>
    </div>
    <button class="btn-success" id="demo-btn">Open Demo UI</button>
    <button class="btn-secondary" id="refresh-btn">Refresh</button>
    <div class="divider"></div>
    <button class="btn-danger" id="disconnect-btn">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
